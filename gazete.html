<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gazete Hacettepe - Görünüm</title>
    <style>
        /* [cite: 2, 3, 4] stil.xsl içindeki tasarım kuralları */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header { border-bottom: 3px solid #b11f24; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #b11f24; margin: 0; font-size: 28px; }
        .featured { background: #fff5f5; border-left: 5px solid #b11f24; padding: 20px; margin-bottom: 30px; }
        .featured h2 { margin-top: 0; color: #333; }
        .article-card { border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 5px; transition: 0.3s; }
        .article-card:hover { border-color: #b11f24; background-color: #fafafa; }
        .meta { font-size: 0.85em; color: #666; margin-bottom: 10px; }
        .tag { background: #b11f24; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; margin-right: 5px; }
        .author { font-weight: bold; color: #444; }
        footer { margin-top: 40px; text-align: center; font-size: 0.9em; color: #888; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container" id="content">
        </div>

    <script>
        // hacettepegazete.xml içindeki veriler
        const gazeteVerisi = {
            metadata: { title: "Gazete Hacettepe", copyright: "2022 Gazete Hacettepe" },
            featured: {
                title: "Türkiye'nin en kapsamlı Biyoçeşitlilik Müzesi Hacettepe'de açıldı",
                summary: "Türlerin ve genlerin biosferdeki serüvenlerinin keşfedileceği Hacettepe Üniversitesi Biyoçeşitlilik Müzesi (BİYOSFER) açıldı."
            },
            haberler: [
                { title: "Hacettepe'den Uluslararası Başarı: BioPATH-SAID projesine AB desteği", date: "11.03.2026", author: "Prof. Dr. Seza Özen", category: "Projeler", faculty: "Tıp Fakültesi" },
                { title: "Bologna-Ankara arasında değişim ve iş birliği proje başladı", date: "10.03.2026", author: "CENK GÜRAY", category: "Projeler", faculty: "Ankara Devlet Konservatuvarı" },
                { title: "Hacettepe'de artırılmış gerçeklik ile yeni müze deneyimi", date: "06.03.2026", author: "BANU BULDUK TÜRKMEN", category: "Projeler", faculty: "Grafik Bölümü" }
            ]
        };

        // Sayfayı Oluşturma
        let html = `
            <header>
                <h1>${gazeteVerisi.metadata.title}</h1>
            </header>
            <div class="featured">
                <small>ÖNE ÇIKAN HABER</small>
                <h2>${gazeteVerisi.featured.title}</h2>
                <p>${gazeteVerisi.featured.summary}</p>
            </div>
            <h3>Son Haberler</h3>
        `;

        gazeteVerisi.haberler.forEach(haber => {
            html += `
                <div class="article-card">
                    <div class="meta">
                        <span class="tag">${haber.category}</span>
                        <span>${haber.date}</span> | <span class="author">${haber.author}</span>
                    </div>
                    <h2>${haber.title}</h2>
                    <p>${haber.faculty}</p>
                </div>
            `;
        });

        html += `<footer><p>${gazeteVerisi.metadata.copyright}</p></footer>`;
        document.getElementById('content').innerHTML = html;
    </script>
</body>
</html>
